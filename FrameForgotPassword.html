<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="CSS/frames.css">
  <link rel="stylesheet" href="CSS/forgotpassword.css">
</head>
<body>
  <div class="forgot-container">
    <h1>Forgot your password?</h1>
    <p class="small-muted">Enter your account email and we'll send a password reset link.</p>

    <form id="forgotForm">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>

      <div class="actions-row">
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
        <a href="FrameLogin.html" class="btn btn-secondary">Back to Login</a>
      </div>

      <div id="fpMessage" class="small-muted" aria-live="polite"></div>
    </form>
  </div>

  <script type="module" src="JS/supabase-auth.js"></script>
  <script type="module" src="JS/forgotpassword.js"></script>
</body>
</html>
