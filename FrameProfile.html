<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile</title>
  <link rel="icon" type="image/png" href="Images/SpotEase.png?v=1" sizes="any">
  <link rel="apple-touch-icon" href="Images/SpotEase.png?v=1">
  <link rel="stylesheet" href="CSS/frames.css">
  <link rel="stylesheet" href="CSS/profile.css">
  <link rel="stylesheet" href="CSS/navbar.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
	<div id="navbar"></div>
	<script>
  fetch('FrameNavbar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('navbar').innerHTML = html;
      const s = document.createElement('script');
      s.type = 'module';
      s.src = 'JS/navbar.js';
      document.body.appendChild(s);
    });
</script>

  <div class="profile-page">
    <header>
      <h1>Account Profile</h1>
      <p class="small-muted">Update your account details and view your reservation history.</p>
    </header>

    <main class="profile-card">
      <form id="profileForm">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" required>

        <label for="email">Email</label>
        <input id="email" type="email" required>

        <label for="role">Role / Status</label>
        <select id="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="guest">Guest</option>
        </select>

        <h3>Change Password</h3>
        <label for="currentPassword">Current Password</label>
        <input id="currentPassword" type="password" placeholder="Current password">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" placeholder="New password">
        <label for="confirmPassword">Confirm New Password</label>
        <input id="confirmPassword" type="password" placeholder="Confirm new password">

        <div class="actions-row">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a class="btn btn-secondary" href="FrameMyReservations.html">View Reservation History</a>
        </div>

        <div id="profileMsg" class="small-muted" aria-live="polite"></div>
      </form>
    </main>
  </div>

  <script type="module" src="JS/profile.js"></script>
</body>
</html>
