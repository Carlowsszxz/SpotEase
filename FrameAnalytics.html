<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analytics</title>
  <link rel="stylesheet" href="CSS/frames.css">
  <link rel="stylesheet" href="CSS/admin-navbar.css">
  <link rel="stylesheet" href="CSS/analytics.css">
  <link rel="stylesheet" href="CSS/bold-typography.css">
</head>
<body>
	<div id="navbar"></div>
	<script type="module">
		import { injectAdminNavbar } from './JS/app-shell.js';
		injectAdminNavbar();
	</script>

  <div class="analytics-page">
    <header>
      <h1>Analytics</h1>
      <p class="small-muted">Usage charts, occupancy trends and recommendations.</p>
    </header>

    <section class="charts">
      <div class="chart-card">
        <h3>Usage Over Time</h3>
        <canvas id="usageChart"></canvas>
        <p id="usageChartSummary" class="chart-summary"></p>
      </div>

      <div class="chart-card">
        <h3>Peak Hours (by hour of day)</h3>
        <canvas id="peakChart"></canvas>
        <p id="peakChartSummary" class="chart-summary"></p>
      </div>

      <div class="chart-card">
        <h3>Peak Hours (Ultrasonic Sensor)</h3>
        <canvas id="ultrasonicPeakChart"></canvas>
        <p id="ultrasonicPeakSummary" class="chart-summary"></p>
      </div>

      <div class="chart-card">
        <h3>Peak Hours (RFID Activity)</h3>
        <canvas id="rfidPeakChart"></canvas>
        <p id="rfidPeakSummary" class="chart-summary"></p>
      </div>
    </section>

    <section class="maintenance-suggestions">
      <h3>AI Maintenance Recommendations</h3>
      <div id="maintenanceSuggestions" class="suggestions-list"></div>
    </section>

    <section class="insights">
      <h3>Insights</h3>
      <div id="insightsList" class="insights-list"></div>
      <div class="actions">
        <button id="exportCsv" class="btn btn-secondary">Export Reservations CSV</button>
      </div>
    </section>

  </div>

  <script type="module">
    import { checkAdminAuth } from './JS/admin-auth.js'

    // Check authentication and admin role
    checkAdminAuth('FrameLogin.html', 'FrameDashboard.html')
  </script>
  <script type="module" src="JS/analytics.js"></script>
</body>
</html>
