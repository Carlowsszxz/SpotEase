<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="CSS/register.css">
    <link rel="stylesheet" href="CSS/bold-typography.css">
    <style>
        .reset-container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: var(--bt-card);
            border: 1px solid var(--bt-border);
        }
        .reset-container h1 {
            margin-bottom: 20px;
            text-align: center;
        }
        .reset-container form {
            display: flex;
            flex-direction: column;
        }
        .reset-container label {
            margin-top: 15px;
            font-weight: 500;
        }
        .reset-container input {
            padding: 10px;
            margin-top: 5px;
            font-size: 14px;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            font-weight: 500;
        }
        .message.success {
            background: var(--bt-muted);
            color: var(--bt-foreground);
            border: 1px solid var(--bt-border);
        }
        .message.error {
            background: var(--bt-muted);
            color: var(--bt-accent);
            border: 1px solid var(--bt-border);
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>Reset Password</h1>
        <form id="resetForm">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required placeholder="At least 6 characters">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">

			<button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <p id="reset-message" class="message" style="display: none;"></p>
    </div>

    <script type="module" src="JS/supabase-auth.js"></script>
    <script type="module" src="JS/resetpassword.js"></script>
</body>
</html>
