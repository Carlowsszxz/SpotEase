<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login</title>
    <link rel="icon" type="image/png" href="Images/SpotEase.png?v=1" sizes="any">
    <link rel="apple-touch-icon" href="Images/SpotEase.png?v=1">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-image-section">
            <img src="Images/LoginImage.jpg" alt="Building" class="login-image">
            <div class="login-image-overlay">
            </div>
        </div>

        <div class="login-form-section">
            <a href="FrameHome.html" class="logo-home-link">
                <span class="logo-text">SpotEase</span>
            </a>
            <h1>Login</h1>
            
            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your Email here" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your Password here" required>
                </div>

                <button type="submit" class="btn-primary">Sign in</button>
            </form>

            <p id="error-message" class="message"></p>

            <p class="signup-link">Don't have an account? <a href="FrameRegister.html" target="contentFrame">Sign up</a></p>

            <div class="divider">
                <span>- OR -</span>
            </div>

            <button id="googleSignBtn" class="btn-google">
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Sign in with Google</span>
            </button>

            <p class="university-footer">University of Makati</p>
        </div>
    </div>

    <script type="module" src="JS/supabase-auth.js"></script>
    <script type="module" src="JS/login.js"></script>
</body>
</html>
