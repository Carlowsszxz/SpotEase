<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resource Map</title>
  <link rel="icon" type="image/png" href="Images/SpotEase.png?v=1" sizes="any">
  <link rel="apple-touch-icon" href="Images/SpotEase.png?v=1">
  <link rel="stylesheet" href="CSS/frames.css">
  <link rel="stylesheet" href="CSS/map.css">
  <link rel="stylesheet" href="CSS/modal.css">
  <link rel="stylesheet" href="CSS/navbar.css">
  <link rel="stylesheet" href="CSS/bold-typography.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module">
    import { checkAuth } from './JS/auth.js';
    checkAuth('FrameLogin.html');
  </script>
</head>
<body>
	<div id="navbar"></div>
	<script>
  fetch('FrameNavbar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('navbar').innerHTML = html;
      const s = document.createElement('script');
      s.type = 'module';
      s.src = 'JS/navbar.js';
      document.body.appendChild(s);
    });
</script>


  <div class="map-page">
    <div id="statusBar" class="status-bar" aria-live="polite"></div>

    <header class="map-header">
      <h1>Resource Map</h1>
      <div class="map-controls">
        <label>Choose Resource Type:
          <select id="filterType">
            <option value="all">Select a type</option>
          </select>
        </label>
        <label>Choose Location:
          <select id="filterLocation">
            <option value="all">Select a location</option>
          </select>
        </label>
      </div>
    </header>

    <section class="legend" id="floorplanLegend" style="display:none;">
      <div><span class="dot free"></span> Available</div>
      <div><span class="dot occupied"></span> Occupied</div>
      <div><span class="dot pending"></span> Reserved</div>
    </section>

    <div class="stats" id="floorplanStats" style="display:none;">
      <div class="stat-box free">
        <div>Available</div>
        <div id="count-free">0</div>
      </div>
      <div class="stat-box occupied">
        <div>Occupied</div>
        <div id="count-occupied">0</div>
      </div>
      <div class="stat-box reserved">
        <div>Reserved</div>
        <div id="count-reserved">0</div>
      </div>
    </div>

    <div id="emptyStateMessage" class="empty-state">
      <div class="empty-state-content">
        <p>Please select a resource type and location to view the floor plan</p>
      </div>
    </div>
